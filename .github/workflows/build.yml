name: Build

on:
  push:
    branches: [ master ]
    tags: [ '*' ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Configure Tests
      run: cmake -B ${{github.workspace}}/build_tests -S ${{github.workspace}}/tests

    - name: Build Tests
      run: cmake --build ${{github.workspace}}/build_tests --config Release -j

    - name: Run Tests
      run: ctest --test-dir ${{github.workspace}}/build_tests --build-config Release --output-on-failure

    - name: Configure Application
      run: cmake -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded -DCMAKE_C_FLAGS_RELEASE="/MT /O2" -B ${{github.workspace}}/build

    - name: Build Application
      run: cmake --build ${{github.workspace}}/build --config Release -j

    - name: Archive
      if: ${{ github.ref_type == 'tag' }}
      uses: actions/upload-artifact@v7
      with:
        name: FakeEsptool-${{github.ref_name}}
        path: build/Release/FakeEsptool.exe
        retention-days: 1
